root = "."
tmp_dir = "tmp"

[build]
pre_cmd = ["mkdir -p tmp", "mkdir -p logs"]
cmd = "go build -o ./bin/taskmanager-server ./cmd/server/"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "bin", "../frontend"]

full_bin = "./bin/taskmanager-server"

[log]
# 显示时间戳
time = true
# 静默模式 - 日志会写入 tmp_dir 下的 build-errors.log
# 应用输出通过 Makefile 重定向到 logs/air.log

[screen]
clear_on_rebuild = false
keep_scroll = true
