root = "."
tmp_dir = "tmp"

[build]
pre_cmd = ["mkdir -p tmp", "mkdir -p logs"]
cmd = "go build -o ./tmp/taskmanager ./cmd/server/"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "bin", "../frontend"]

full_bin = "./tmp/taskmanager"

[log]
time = true
# Air 运行日志文件
build_log = "logs/air_build.log"
# Air 运行日志输出到这个文件（包含每次 rebuild 后的应用输出）
log = "logs/air.log"
# 同时输出到终端（保持可见性）
stdout_on_build = true
stderr_on_build = true

[screen]
clear_on_rebuild = false
keep_scroll = true
