# 简化版软件开发流程状态机
# 适合快速测试和演示
#
# 状态：todo → processing → completed
#
# 这是一个最小化的可工作流程，演示状态机的完整功能

name: simple_dev_workflow
description: 简化版开发流程，用于快速测试

initial_state: todo

states:
  - id: todo
    name: 待办
    is_final: false
  - id: processing
    name: 处理中
    is_final: false
  - id: completed
    name: 已完成
    is_final: true

transitions:
  - from: todo
    to: processing
    trigger: start
    description: 开始处理
    hooks:
      - name: 通知开始处理
        type: webhook
        config:
          url: https://httpbin.org/post
          method: POST
        timeout: 30
        retry: 1

  - from: processing
    to: completed
    trigger: complete
    description: 完成处理
    hooks:
      - name: 发送完成通知
        type: webhook
        config:
          url: https://httpbin.org/post
          method: POST
        timeout: 30
        retry: 1
