# 软件开发流程状态机
# 这是一个完整的软件开发流程
#
# 状态说明：
#   - todo: 待办（初始状态）
#   - analyzing: 分析需求
#   - implementing: 编写代码
#   - submitting: 提交PR
#   - completed: 已完成（终态）
#
# 转换说明：
#   - start: 开始处理
#   - analyze: 开始分析
#   - implement: 开始编码
#   - submit: 提交代码审查
#   - approve: 审查通过
#   - reject: 审查拒绝，打回

name: software_development_workflow
description: 完整的软件开发流程，从代码提交到生产环境上线

initial_state: todo

states:
  # 待办（初始状态）
  - id: todo
    name: 待办
    is_final: false

  # 分析需求
  - id: analyzing
    name: 分析需求
    is_final: false

  # 编写代码
  - id: implementing
    name: 编写代码
    is_final: false

  # 提交PR
  - id: submitting
    name: 提交PR
    is_final: false

  # 已完成（终态）
  - id: completed
    name: 已完成
    is_final: true

transitions:
  # 开始处理
  - from: todo
    to: analyzing
    trigger: start
    description: 开始处理需求
    hooks:
      - name: 通知开始处理
        type: webhook
        config:
          url: https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-here
          method: POST
        timeout: 30
        retry: 1

  # 开始分析
  - from: analyzing
    to: implementing
    trigger: analyze
    description: 分析完成，开始编写代码

  # 开始编码
  - from: implementing
    to: submitting
    trigger: implement
    description: 代码编写完成，提交PR

  # 审查通过
  - from: submitting
    to: completed
    trigger: approve
    description: 审查通过，标记完成

  # 审查拒绝
  - from: submitting
    to: implementing
    trigger: reject
    description: 审查拒绝，打回编码
